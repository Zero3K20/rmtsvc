# Downpour configuration file
# Place this file in the same directory as Downpour.exe

# Web server settings
# port        : HTTP port to listen on (default 7778)
# bindip      : IP address to bind to (omit to bind all interfaces)
# root        : path to the html directory (defaults to ./html/ next to the exe)
# ssl_enabled : set to true to enable HTTPS (requires OpenSSL build)
webs port=7778

# User account (remove this line to allow anonymous access)
# access=ACCESS_ALL grants full torrent management
user account=admin pswd=changeme access=ACCESS_ALL

# Download directory – torrents are downloaded here on the server machine
# Defaults to a "downloads" folder next to Downpour.exe if not set
# download_dir=C:\Torrents\Downloads

# Startup behaviour
# sets faceless=TRUE   run hidden (no console window) on launch
# sets install=TRUE    add to Windows startup (same as -i command-line flag)
