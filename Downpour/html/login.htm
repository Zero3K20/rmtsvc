<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Downpour – Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <h2>&#9928; Downpour</h2>
    <form action="/login" method="POST">
      <label>Username</label>
      <input type="text" name="user" id="user" autocomplete="username">
      <label>Password</label>
      <input type="password" name="pswd" autocomplete="current-password">
      <div class="login-row">
        <div>
          <label>Verify Code</label>
          <input type="text" name="chkcode" style="width:80px">
        </div>
        <span class="checkcode-img" id="codeImg" onclick="reloadCode()" title="Click to refresh"></span>
      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" name="remember" value="1"> Remember me for 30 days
      </label>
      <button type="submit" class="submit-btn" style="margin-top:16px">Sign In</button>
    </form>
  </div>
</div>
<script>
function reloadCode() {
  fetch('/checkcode')
    .then(r => r.text())
    .then(t => { document.getElementById('codeImg').textContent = t; });
}
window.onload = function() {
  document.getElementById('user').focus();
  reloadCode();
};
</script>
</body>
</html>
