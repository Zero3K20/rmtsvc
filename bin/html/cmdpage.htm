<HTML>
<HEAD>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE=javascript>

function processRequest() 
{
if (xmlHttp.readyState == 4) {
if (xmlHttp.status == 200){
document.getElementById("txtOutput").value=document.getElementById("txtOutput").value+xmlHttp.responseText;

            } //else alert("Request error, status="+xmlHttp.status);
            hidePopup();
        }
}

function window_onload()
{
if(!oPopup) createpopup();   
if(!xmlHttp) createXMLHttpRequest();
document.getElementById("cmdInput").focus();
}
function keypress(txtElement, e)
{
var scmd=document.getElementById("cmdInput").value;
e = e || window.event;
if(e && e.keyCode==13 && scmd!="")
{
if(e.preventDefault) e.preventDefault(); else e.returnValue=false;
showPopup(250, 200, 150, 20);
xmlHttp.open("GET", "/cmdpage", true);
xmlHttp.onreadystatechange = processRequest;
xmlHttp.send("cmd="+scmd);
}
}
function clsOutput()
{
document.getElementById("txtOutput").value="";
}

</SCRIPT>
</HEAD>
<body onload="window_onload();" >
<br>
<table BORDER=0 CELLSPACING=0 CELLPADDING=0 align="center">
<tr bgcolor="#e5e5e5" height=25px >
<td width="80px">
&nbsp;<B>Command:<B>
</td>
<td width=520px>
<input id=cmdInput type="text" style="width:450px" onkeypress="javascript:keypress(this,event);">
&nbsp;
<input id=btnInput type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 title="Clear the output area" 
 onmouseover='javascript:this.className="btnUP";' value="Clear" onclick="javascript:clsOutput();">
</td><tr>

<tr>
<td colspan=2>
<TEXTAREA id=txtOutput class="txtInput_b" ROWS=30 style="width:600px;" READONLY></TEXTAREA>
</td></tr>

</table>
</BODY>
</HTML>
