<HTML>
<HEAD>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE=javascript src="viewReg.js"></SCRIPT>
</HEAD>
<body onload="window_onload()" style="overflow:hidden;">
<table WIDTH=100%  height=100% BORDER=1 CELLSPACING=0 CELLPADDING=0>

<tr height=25px>
<td>
&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Delete" id=fDelkey onclick="delKey();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Add" id=fAddkey onclick="addKey();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Refresh" onclick="refreshKey();">
 &nbsp;Total <span id="lblKeyNum" name="lblKeyNum"></span>&nbsp;subkey(s)
</td>
<td>
&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Add" id=fAddItem onclick="addItem();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Delete" id=fDelItem onclick="delItem();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Refresh" onclick="refreshItem();">
 &nbsp;Subkey: <span id="lblRegKey" name="lblRegKey"></span>
 &nbsp; - Item: <span id="lblRegItem" name="lblRegItem"></span>
 &nbsp;<span id="lblHelp" name="lblHelp"></span>
</td>
</tr>

<tr>
<td valign=top width="30%">
 <div style="height:100%;width:100%;overflow:auto;" >
 <table id=tblRegkey name=tblRegkey width=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
 <THEAD>
 <tr height=18px bgColor="Silver">
 <th width="20px"> &nbsp;<A href="javascript:goup();" style="cursor:pointer;">UP</A> </th>
 <th> Key Name </th>
 </tr></THEAD>
 <TBODY id="regkeyTbody"></TBODY>
 </table>
 </div>
</td>
<td valign=top >
 <div style="height:100%;width:100%;overflow:auto;" >
 <table id=tblRegitem name=tblRegitem width=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
 <THEAD>
 <tr height=18px bgColor="Silver">
 <th width=20px> &nbsp; </th>
 <th width=100px> Type </th>
 <th width=80px> Length </th>
 <th width=220px> Name </th>
 <th> Data </th>
 </tr></THEAD>
 <TBODY id="regitemTbody"></TBODY>
 </table>
 </div>
</td>
</tr>

<tr><td colspan=2 bgcolor=Silver height=20px nowrap>
&nbsp;
<A href="javascript:goto();" style="cursor:pointer;">Go to</A>
<A href="javascript:goup();" style="cursor:pointer;">Up</A>&nbsp;
<span id="lblRegPath" name="lblRegPath"></span>
</td></tr>
</table>
</BODY>
</HTML>
