<HTML>
<HEAD>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE=javascript src="viewFile.js"></SCRIPT>
</HEAD>
<body onload="window_onload()" style="overflow:hidden;">
<table WIDTH=100%  height=100% BORDER=1 CELLSPACING=0 CELLPADDING=0>

<tr height=25px>
<td>
&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Rename" id=fRenFolder onclick="renFolder();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Delete" id=fDelFolder onclick="delFolder();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="New" id=fNewFolder onclick="newFolder();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Properties" id=fProFolder onclick="proFolder();">
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Refresh" onclick="refreshFolder();">
</td>
<td>
&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Run" id=fRunFile onclick="runFile();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Delete" id=fDelFile onclick="delFile();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Upload" id=fUpFile onclick="upFile();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Download" id=fDwFile onclick="dwFile();" >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Properties" id=fProFile onclick="proFile();" >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Refresh" onclick="refreshFile();">
 &nbsp;<span id="lblHelp" name="lblHelp"></span>
</td>
</tr>

<tr>
<td valign=top width="30%" >
 <div style="height:100%;width:100%;overflow:auto;" >
 <xml id="folderXML" ></xml>
 <table id=tblFolder name=tblFolder datasrc="#folderXML" width=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
 <THEAD>
 <tr height=18px bgColor="Silver">
 <th width="20px">&nbsp;<A href="javascript:goup();" style="cursor:hand;">UP</A>  
 </th>
 <th> Folder </th>
 <th width="20px">&nbsp;<A href="javascript:document.getElementById('lblFolder').innerText='';refreshFile();" style="cursor:hand;">./</A>  
 </th>
 </tr>
 <THEAD>
 <TBODY>
 <tr onmousemove="javascript:this.style.background='#e5e5e5';" onmouseout="javascript:this.style.background='#ffffff';"  height=18px>
 <td onclick="javascript:folderDblClick(this.parentElement);">
 &nbsp;<span datafld="hassub" style="cursor:hand;" ></span>&nbsp;</td>
 <td onclick="javascript:folderClick(this.parentElement);" nowrap >
 <span datafld="fname" style="cursor:hand;" ></span></td>
 <td align=center> <span datafld="bhide"></span> </td>
 </tr>
 <TBODY>
 </table>
 </div>
</td>
<td valign=top >
 <div style="height:100%;width:100%;overflow:auto;" >
 <xml id="fileXML" ></xml>
 <table id=tblFile name=tblFile datasrc="#fileXML" width=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
 <THEAD>
 <tr height=18px bgColor="Silver">
 <th align=left style="cursor:hand" onclick="sort('fileXML','fileStyle','fname');">&nbsp;<u>Filename</u> </th>
 <th width="20px"> &nbsp; </th>
 <th width=80px align=right style="cursor:hand" onclick="sort('fileXML','fileStyle','lsize');"> <u>Size</u>&nbsp; </th>
 <th width=150px align=left style="cursor:hand" onclick="sort('fileXML','fileStyle','ftype');">&nbsp;<u>Type</u> </th>
 <th width=150px align=left style="cursor:hand" onclick="sort('fileXML','fileStyle','ftime');">&nbsp;<u>Modified</u> </th>
 </tr><THEAD>
 <TBODY>
 <tr onmousemove="javascript:this.style.background='#e5e5e5';" onmouseout="javascript:this.style.background='#ffffff';"  
  id=fFiles onclick="javascript:fileClick(this);" style="cursor:hand;" >
 <td><input type=text class="txtInput_none" datafld="fname" READONLY onclick="javascript:modifyItem(this);" 
 onblur="javascript:cancelModifyItem(this);" onkeypress="javascript:keypress(this);"></td>
 <td align=center> <span datafld="bhide"></span> </td>
 <td align=right ><span datafld="fsize" >&nbsp;</span></td>
 <td >&nbsp;<span datafld="ftype" ></span></td>
 <td >&nbsp;<span datafld="ftime" ></span></td>
 </tr>
 <TBODY></table>
 </div>
</td>
</tr>

<tr>
<td bgcolor=Silver height=20px nowrap>
&nbsp;Total <span id="lblFolderNum" name="lblFolderNum">0</span> subfolder(s)
&nbsp;- <span id="lblFolder" name="lblFolder"></span>
</td>
<td bgcolor=Silver height=20px nowrap>
&nbsp;Total <span id="lblFileNum" name="lblFileNum">0</span> file(s)
&nbsp;- File: <span id="lblFile" name="lblFile"></span>
</td>
</tr>

<tr><td colspan=2 bgcolor=Silver height=20px nowrap>
<a href="adostream.reg" target="_blank" title="Download and run REG file to fix registry and enable ADODB.Stream object">
S</a>&nbsp;
<A href="" onclick="javascript:window.event.returnValue=false;">
<span onclick="javascript:swichHide(this);" style="cursor:hand;">Show Hidden Files </span></A>
&nbsp;
<A href="javascript:goto();" style="cursor:hand;">Go to</A>
<A href="javascript:goup();" style="cursor:hand;">Up</A>&nbsp;
<span id="lblFilePath" name="lblFilePath"></span>

</td></tr>
</table>

<xml id="fileStyle"> 
<files> 
<xsl:for-each select="fitem" order-by="" xmlns:xsl="http://www.w3.org/TR/WD-xsl"> 
<fitem> 
<fname><xsl:value-of select="fname"/></fname>
<bhide><xsl:value-of select="bhide"/></bhide> 
<fsize><xsl:value-of select="fsize"/></fsize>
<lsize><xsl:value-of select="lsize"/></lsize> 
<ftype><xsl:value-of select="ftype"/></ftype>
<ftime><xsl:value-of select="ftime"/></ftime> 
</fitem> 
</xsl:for-each> 
</files> 
</xml> 

</BODY>
</HTML>
