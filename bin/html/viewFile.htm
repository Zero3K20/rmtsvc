<HTML>
<HEAD>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE=javascript src="viewFile.js"></SCRIPT>
</HEAD>
<body onload="window_onload()" style="overflow:hidden;">
<table WIDTH=100%  height=100% BORDER=1 CELLSPACING=0 CELLPADDING=0>

<tr height=25px>
<td>
&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Rename" id=fRenFolder onclick="renFolder();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Delete" id=fDelFolder onclick="delFolder();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="New" id=fNewFolder onclick="newFolder();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Properties" id=fProFolder onclick="proFolder();">
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Refresh" onclick="refreshFolder();">
</td>
<td>
&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Run" id=fRunFile onclick="runFile();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Delete" id=fDelFile onclick="delFile();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Upload" id=fUpFile onclick="upFile();" disabled >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Download" id=fDwFile onclick="dwFile();" >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Properties" id=fProFile onclick="proFile();" >
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Refresh" onclick="refreshFile();">
 &nbsp;<span id="lblHelp" name="lblHelp"></span>
</td>
</tr>

<tr>
<td valign=top width="30%" >
 <div style="height:100%;width:100%;overflow:auto;" >
 <table id=tblFolder name=tblFolder width=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
 <THEAD>
 <tr height=18px bgColor="Silver">
 <th width="20px">&nbsp;<A href="javascript:goup();" style="cursor:pointer;">UP</A>  
 </th>
 <th> Folder </th>
 <th width="20px">&nbsp;<A href="javascript:void(0);" onclick="javascript:document.getElementById('lblFolder').innerText='';refreshFile();" style="cursor:pointer;">./</A>  
 </th>
 </tr>
 </THEAD>
 <TBODY id="tblFolderBody">
 </TBODY>
 </table>
 </div>
</td>
<td valign=top >
 <div style="height:100%;width:100%;overflow:auto;" >
 <table id=tblFile name=tblFile width=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
 <THEAD>
 <tr height=18px bgColor="Silver">
 <th align=left style="cursor:pointer" onclick="sortFiles('fname');">&nbsp;<u>Filename</u> </th>
 <th width="20px"> &nbsp; </th>
 <th width=80px align=right style="cursor:pointer" onclick="sortFiles('lsize');"> <u>Size</u>&nbsp; </th>
 <th width=150px align=left style="cursor:pointer" onclick="sortFiles('ftype');">&nbsp;<u>Type</u> </th>
 <th width=150px align=left style="cursor:pointer" onclick="sortFiles('ftime');">&nbsp;<u>Modified</u> </th>
 </tr>
 </THEAD>
 <TBODY id="tblFileBody">
 </TBODY>
 </table>
 </div>
</td>
</tr>

<tr>
<td bgcolor=Silver height=20px nowrap>
&nbsp;Total <span id="lblFolderNum" name="lblFolderNum">0</span> subfolder(s)
&nbsp;- <span id="lblFolder" name="lblFolder"></span>
</td>
<td bgcolor=Silver height=20px nowrap>
&nbsp;Total <span id="lblFileNum" name="lblFileNum">0</span> file(s)
&nbsp;- File: <span id="lblFile" name="lblFile"></span>
</td>
</tr>

<tr><td colspan=2 bgcolor=Silver height=20px nowrap>
<A href="javascript:void(0);" onclick="javascript:swichHide(this); return false;">
<span style="cursor:pointer;">Show Hidden Files </span></A>
&nbsp;
<A href="javascript:goto();" style="cursor:pointer;">Go to</A>
<A href="javascript:goup();" style="cursor:pointer;">Up</A>&nbsp;
<span id="lblFilePath" name="lblFilePath"></span>

</td></tr>
</table>

</BODY>
</HTML>
