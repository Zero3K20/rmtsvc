<HTML>
<HEAD>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE=javascript>

function processRequest() 
{
	if (xmlHttp.readyState == 4) { // Check object state
		if (xmlHttp.status == 200) { // Data returned successfully, start processing
			
			var xmlobj = xmlHttp.responseXML;
			var node=xmlobj.getElementsByTagName("settings");
			if(node.length>0) 
				document.getElementById("txtSetings").value=(node.item(0).textContent || node.item(0).text);
			
			var retmsg=xmlobj.getElementsByTagName("retmsg");
    			if(retmsg.length>0)
				alert((retmsg.item(0).textContent || retmsg.item(0).text));
            	} //else alert("Request error,status="+xmlHttp.status);
            	hidePopup();
        }
}

function window_onload()
{
	if(!oPopup) createpopup();   	
	if(!xmlHttp) createXMLHttpRequest();
}

function backOUT()
{
	showPopup(250, 200, 150, 20);
	xmlHttp.open("GET", "/ftpini?cmd=out", true);
	xmlHttp.onreadystatechange = processRequest;
	xmlHttp.send( null );
}

function backIN()
{
	if(document.getElementById("txtSetings").value=="") return;
	showPopup(250, 200, 150, 20);
	var strEncode="ini="+document.getElementById("txtSetings").value;
	strEncode=strEncode.replace(/&/g,"%26");
	xmlHttp.open("POST", "/ftpini?cmd=in", true);
	xmlHttp.setRequestHeader("Content-Type","application/x-www-form-urlencoded; charset=utf-8");
	xmlHttp.onreadystatechange = processRequest;
	xmlHttp.send( strEncode );
}

</SCRIPT>
</HEAD>
<body onload="window_onload()" >

</td>
<td width=100px>
<input id=btnInput type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Import" onclick="javascript:backIN();">
<input id=btnOutput type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";'  
 onmouseover='javascript:this.className="btnUP";' value="Export" onclick="javascript:backOUT();"> 
</td><tr>

<tr>

</td></tr>
