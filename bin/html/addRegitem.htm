<html>
<head>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<script language="javascript">
function addregitem()
{
var param="rtype=";
if(document.getElementById("rtype2").checked)
param=param+document.getElementById("rtype2").value;
else if(document.getElementById("rtype3").checked)
param=param+document.getElementById("rtype3").value;
else
param=param+document.getElementById("rtype1").value;
var tmp=document.getElementById("rname").value;
param=param+"&rname="+tmp.replace(/&/g,"%26");
tmp=document.getElementById("rdata").value;
param=param+"&rdata="+tmp.replace(/&/g,"%26");
if(window.opener && window.opener._addItemCallback)
	window.opener._addItemCallback(param);
window.close();

}
</script>
<title>Add Registry Value</title>
</head>
<body>

<table style="LEFT: 0px;POSITION: absolute;TOP: 0px" cellSpacing="0" cellPadding="0" width="100%" height="100%" border="0">
<tr height=25px><td>
Value Type:
<input type=radio value="REG_SZ" name=rtype id=rtype1 checked>String
&nbsp;&nbsp;
<input type=radio value="REG_DWORD" name=rtype id=rtype2 >DWORD
&nbsp;&nbsp;
<input type=radio value="REG_BINARY" name=rtype id=rtype3 >Binary
</td></tr>
<tr height=25px><td>
Value Name:<input type=text value="" name=rname id=rname>
</td></tr>
<tr><td>
<TEXTAREA id=rdata name=rdata WRAP STYLE="width:100%;height:100%;">
</TEXTAREA>
</td></tr>
<tr height=25px><td align=center>
<span style="height:20px;width:55px;" class="btnOff" onmouseout='javascript:this.className="btnOff";' onmouseover='javascript:this.className="btnUP";'>
&nbsp;&nbsp;<A href="" onclick="javascript:addregitem();return false;">OK</A>&nbsp;&nbsp;</span>
&nbsp;&nbsp;&nbsp;&nbsp;
<span style="height:20px;width:55px;" class="btnOff" onmouseout='javascript:this.className="btnOff";' onmouseover='javascript:this.className="btnUP";'>
&nbsp;&nbsp;<A href="" onclick="javascript:window.close();return false;" >Cancel</A>&nbsp;&nbsp;</span>
</td></tr>
</table>

</body>
</html>
