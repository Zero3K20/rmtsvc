<html>
<head>
<title>middle</title>
<SCRIPT language=javascript>
function Submit_onclick()
{
if(parent.myFrames.cols=="180,12,0,*")
{
	parent.myFrames.cols="0,12,0,*";
	document.getElementById("ImgArrow").innerText="→ Open →";
}else{
	parent.myFrames.cols="180,12,0,*";
	document.getElementById("ImgArrow").innerText="← Close ←";
}
setTimeout(function(){
	try{
		var fv=parent.frmView;
		if(fv && fv._fitCanvasToContainer) fv._fitCanvasToContainer();
	}catch(e){}
},0);
}
</SCRIPT>
<style>
#ImgArrow {
	writing-mode: vertical-rl;
	text-orientation: mixed;
	transform: rotate(180deg);
	font-size: 10px;
	white-space: nowrap;
	user-select: none;
}
</style>
</head>
<body topmargin="0" leftmargin="0" bgcolor="#CEE5FF" >
 <TABLE cellSpacing="0" cellPadding="0" width="12" border="0" height="100%">
 <tr>
	<td width="12" bgcolor=Silver></td>
 </tr>
<tr>
	<td id=ImgArrow height="122" width="12" align=center style="cursor:pointer;" onclick="javascript:Submit_onclick()">
	← Close ←
	</td>
</tr>
<tr>
	<td width="12" bgcolor=Silver></td>
</tr>
</TABLE>
</body>
</html>
