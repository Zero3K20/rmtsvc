<HTML>
<HEAD>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE=javascript src="viewProcess.js"></SCRIPT>
</HEAD>
<body onload="window_onload()" style="overflow:hidden;">
<table WIDTH=100%  height=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
<tr height=110px>
<td  valign=top width=400px>
<br>
&nbsp;<b>System Info</b>:<br>
&nbsp;Machine Name:&nbsp;<label name=lblName id=lblName></label><br>
&nbsp;OS Info:&nbsp;<label id=lblOS></label><br>
&nbsp;CPU Count:&nbsp;<label id=lblCPU></label><br>
&nbsp;Status:&nbsp;<label id=lblSta></label><br>
&nbsp;Account:&nbsp;<label id=lblAccount></label><br>
</td>
<td align=right>
<img width=200px height=80px onload='javascript:Imgloaded();' onclick='javascript:ifRefresh(1000);'  
name=usageimage id=usageimage title="green - CPU usage
Yellow - Memory usage
click it to stop or resume refresh" >&nbsp;
</td>
</tr>

<tr height=25px>
<td>
&nbsp;<b>Process List</b>&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Kill" onclick="javascript:terminateProcess();">
 &nbsp;&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Refresh" onclick="javascript:loadPlist();">
 &nbsp;&nbsp;<span id="lblProcess" name="lblProcess"></span>
</td>
<td>
&nbsp;<b>Module List</b>&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Unload" onclick="javascript:deattach();">
 &nbsp;&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Properties" onclick="javascript:proFile();">
 &nbsp;&nbsp;<span id="lblModule" name="lblModule"></span>
</td>
</tr>

<tr>
<td valign=top>
 <div style="height:100%;width:100%;overflow:auto;" >
 <table id=tblProcess name=tblProcess width=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
 <THEAD>
 <tr height=18px bgColor="Silver">
 <th width=20px> &nbsp; </th>
 <th width=50px style="cursor:pointer" onclick="sortPlist('pid');"> <u>PID</u> </th>
 <th width=50px style="cursor:pointer" onclick="sortPlist('ppid');"> <u>Parent PID</u> </th>
 <th width=50px style="cursor:pointer" onclick="sortPlist('priority');"> <u>Priority</u> </th>
 <th width=50px style="cursor:pointer" onclick="sortPlist('threads');"> <u>Threads</u> </th>
 <th style="cursor:pointer" onclick="sortPlist('pname');"> <u>Process Name</u> </th>
 </tr></THEAD>
 <TBODY id="plistTbody"></TBODY>
 </table>
 </div>
</td>
<td valign=top >
 <div style="height:100%;width:100%;overflow:auto;" >
 <table id=tblModule name=tblModule width=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
 <THEAD>
 <tr height=18px bgColor="Silver">
 <th width=20px> &nbsp; </th>
 <th width=80px style="cursor:pointer" onclick="sortMlist('mbase');"> <u>Base Address</u> </th>
 <th width=80px> Load Count </th>
 <th style="cursor:pointer" onclick="sortMlist('mname');"> <u>Module Name</u> </th>
 </tr></THEAD>
 <TBODY id="mlistTbody"></TBODY>
 </table>
 </div>
</td>
</tr>

</table>

</BODY>
</HTML>
