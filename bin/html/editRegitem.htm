<html>
<head>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<script language="javascript">
window.onload = function() {
	var init=window._editItemInit;
	if(!init && window.opener) {
		var idx=window.opener.editRegitemIdx;
		if(idx>=0 && window.opener.regitemData)
			init=window.opener.regitemData[idx];
	}
	if(init) {
		document.getElementById("lblName").innerText=init.rname||"";
		document.getElementById("lblType").innerText=init.rtype||"";
		document.getElementById("rdata").value=init.rdata||"";
	}
};
function editregitem() {
	var rdata=document.getElementById("rdata").value;
	if(window._editItemCallback)
		window._editItemCallback(rdata);
	else if(window.opener && window.opener._editItemCallback)
		window.opener._editItemCallback(rdata);
	window.close();
}
</script>
<title>Edit Registry Value</title>
</head>
<body>
<table style="LEFT: 0px;POSITION: absolute;TOP: 0px" cellSpacing="0" cellPadding="4" width="100%" height="100%" border="0">
<tr height=25px><td>
Value Name: <span id="lblName" name="lblName"></span>
</td></tr>
<tr height=25px><td>
Value Type: <span id="lblType" name="lblType"></span>
</td></tr>
<tr><td>
Value Data:<br>
<TEXTAREA id=rdata name=rdata WRAP STYLE="width:100%;height:60px;"></TEXTAREA>
</td></tr>
<tr height=30px><td align=center>
<span style="height:20px;width:55px;" class="btnOff" onmouseout='javascript:this.className="btnOff";' onmouseover='javascript:this.className="btnUP";'>
&nbsp;&nbsp;<A href="" onclick="javascript:editregitem();return false;">OK</A>&nbsp;&nbsp;</span>
&nbsp;&nbsp;&nbsp;&nbsp;
<span style="height:20px;width:55px;" class="btnOff" onmouseout='javascript:this.className="btnOff";' onmouseover='javascript:this.className="btnUP";'>
&nbsp;&nbsp;<A href="" onclick="javascript:window.close();return false;">Cancel</A>&nbsp;&nbsp;</span>
</td></tr>
</table>
</body>
</html>
