<html>
<head>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<title>Set Clipboard</title>
</head>
<body>
<table style="LEFT: 0px;POSITION: absolute;TOP: 0px" cellSpacing="0" cellPadding="0" width="100%" height="100%" border="0">
<tr><td>
<TEXTAREA id=txtInput name=txtInput WRAP STYLE="width:100%;height:100%;">
</TEXTAREA>
</td></tr>
<tr height=25px><td align=center>
<span style="height:20px;width:55px;" class="btnOff" onmouseout='javascript:this.className="btnOff";' onmouseover='javascript:this.className="btnUP";'>
&nbsp;&nbsp;<A href"" onclick="javascript:window.dialogResult=document.getElementById('txtInput').value;window.close();return false;">OK</A>&nbsp;&nbsp;</span>
&nbsp;&nbsp;&nbsp;&nbsp;
<span style="height:20px;width:55px;" class="btnOff" onmouseout='javascript:this.className="btnOff";' onmouseover='javascript:this.className="btnUP";'>
&nbsp;&nbsp;<A href"" onclick="javascript:window.dialogResult='';window.close();return false;" >Cancel</A>&nbsp;&nbsp;</span>
</td></tr>
</table>
</body>
</html>
