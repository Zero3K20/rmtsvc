<HTML>
<HEAD>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE=javascript src="viewPort.js"></SCRIPT>
</HEAD>
<body onload="window_onload()" style="overflow:hidden;">
<table WIDTH=100%  height=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>

<tr height=25px>
<td>
&nbsp;<b>Port/Process List</b>&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Refresh" onclick="javascript:loadFport();">
 &nbsp;&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Kill Process" onclick="javascript:terminateProcess();">
 &nbsp;&nbsp;
 <input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Process Properties" onclick="javascript:proFile();">
 &nbsp;&nbsp;Current PID:<span id="lblProcess" name="lblProcess"></span>
</td>
</tr>

<tr>
<td valign=top width=100%>
 <div style="height:100%;width:100%;overflow:auto;" >
 <table id=tblProcess name=tblProcess BORDER=0 CELLSPACING=0 CELLPADDING=0>
 <THEAD>
 <tr height=18px bgColor="Silver">
 <th width=20px> &nbsp; </th>
 <th width=50px style="cursor:pointer" onclick="sortFport('ptype');"> <u>Protocol</u> </th>
 <th width=50px style="cursor:pointer" onclick="sortFport('pid');"> <u>PID</u> </th>
 <th width=150px style="cursor:pointer" onclick="sortFport('laddr');"> <u>Local Address</u> </th>
 <th width=150px style="cursor:pointer" onclick="sortFport('raddr');"> <u>Remote Address</u> </th>
 <th width=80px style="cursor:pointer" onclick="sortFport('status');"> <u>State</u> </th>
 <th width=200px> Process Name </th>
 </tr></THEAD>
 <TBODY id="fportTbody"></TBODY>
 </table>
 </div>
</td>
</tr>

</table>

</BODY>
</HTML>
