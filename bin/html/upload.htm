<HTML>
<HEAD><title>File Upload</title>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE="javascript">
<!--
	var xmlRatio=null;
	var autoRefresh=0;
	var destpath="";
	function formatFileSize(bytes) {
		bytes=parseInt(bytes)||0;
		if(bytes<1024) return bytes+" B";
		else if(bytes<1024*1024) return (bytes/1024).toFixed(2)+" KB";
		else if(bytes<1024*1024*1024) return (bytes/1024/1024).toFixed(2)+" MB";
		else if(bytes<1024*1024*1024*1024) return (bytes/1024/1024/1024).toFixed(2)+" GB";
		else return (bytes/1024/1024/1024/1024).toFixed(2)+" TB";
	}
	function processRatio()
	{
		if (xmlRatio.readyState == 4) {
			if (xmlRatio.status == 200)
			{
				var xmlobj = xmlRatio.responseXML;
				var node_ratio=xmlobj.getElementsByTagName("ratio");
				var node_rbyte=xmlobj.getElementsByTagName("rbyte");
				var node_abyte=xmlobj.getElementsByTagName("abyte");
				var node_speed=xmlobj.getElementsByTagName("speed");
				document.getElementById("lblRatio").innerText="Upload Progress: "+(node_ratio.item(0).textContent || node_ratio.item(0).text)+"  Upload Speed: "+(node_speed.item(0).textContent || node_speed.item(0).text);
				document.getElementById("lblBytes").innerText="Uploaded: "+formatFileSize(node_rbyte.item(0).textContent || node_rbyte.item(0).text)+"  Total: "+formatFileSize(node_abyte.item(0).textContent || node_abyte.item(0).text);
				if(autoRefresh>0) window.setTimeout("get_upratio()",autoRefresh);
			}
		}
	}
	function get_upratio()
	{
		if(!xmlRatio) return;
		xmlRatio.open("GET", "/get_upratio", true);
		xmlRatio.onreadystatechange = processRatio;
		xmlRatio.send( null);
	}

	function processRequest()
	{
		if (xmlHttp.readyState == 4) {
			autoRefresh=0;
			if (xmlHttp.status == 200)
			{
				if(!window.confirm("File uploaded successfully. Upload another file?"))
				{
					// notify opener if available, then close
					if(window._refreshCallback)
						window._refreshCallback();
					else if(window.opener && window.opener._refreshCallback)
						window.opener._refreshCallback();
					window.close();
				}
			}
			else alert("Upload failed, status="+xmlHttp.status);
		}
	}

	function window_onload()
	{
		if(!oPopup) createpopup();
		if(!xmlHttp) createXMLHttpRequest();
		// get destination path from URL parameter
		var query=window.location.search.substring(1);
		var params=query.split("&");
		for(var i=0;i<params.length;i++) {
			var eqIdx=params[i].indexOf("=");
			if(eqIdx<0) continue;
			if(params[i].substring(0,eqIdx)=="path")
				destpath=decodeURIComponent(params[i].substring(eqIdx+1)||"");
		}
		document.getElementById("destpath").value=destpath;

		if (window.ActiveXObject) {
			xmlRatio = new ActiveXObject("Microsoft.XMLHTTP");
		}
		else if (window.XMLHttpRequest) {
			xmlRatio = new XMLHttpRequest();
		}
	}

	// Upload function using HTML5 File API
	function sendfile()
	{
		var destpathVal=document.form1.destpath.value;
		var fileInput=document.form1.sourcefile;
		if(!fileInput.files || fileInput.files.length==0) {
			alert("Please select a file to upload!");
			return;
		}
		var file=fileInput.files[0];
		var filename=file.name;

		xmlHttp.open("POST", "/upload?path="+encodeURIComponent(destpathVal)+"&name="+encodeURIComponent(filename), true);
		xmlHttp.setRequestHeader("Content-Type","application/octet-stream");
		xmlHttp.onreadystatechange = processRequest;

		autoRefresh=1000;
		window.setTimeout("get_upratio()",autoRefresh);

		xmlHttp.send( file );
	}

	function window_onunload()
	{
		xmlHttp.abort();
	}
//-->
</SCRIPT>
</HEAD>
<body bgColor=silver onload="window_onload()" onunload="window_onunload()" style="overflow:hidden;">
<form name="form1" method="post" >
  &nbsp;<label id=lblRatio name=lblRatio></label><br>
  &nbsp;<label id=lblBytes name=lblBytes></label><br>
  &nbsp;Destination Path:<br>&nbsp;
  <input type="text" id=destpath name=destpath class="txtInput_b" value="">
  <br>&nbsp;Source File:<br>&nbsp;
  <input name="sourcefile" id="sourcefile" TYPE=FILE class="txtInput_b">
  <br><br><center>
  <INPUT TYPE=button VALUE="Upload File" onclick="javascript:sendfile();">
  </center>
</form>
<br>
</body>
</HTML>
