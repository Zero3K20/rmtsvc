<HTML>
<HEAD>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE=javascript src="viewService.js"></SCRIPT>
</HEAD>
<body style="overflow:hidden;" onload="window_onload()">
<table WIDTH=100%  height=100% BORDER=1 CELLSPACING=0 CELLPADDING=0>
<tr height=25px>
<td  valign=middle>
&nbsp;<b>Service List</b>&nbsp;&nbsp;
<input type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' 
 onmouseover='javascript:this.className="btnUP";' value="Refresh" onclick="javascript:loadSlist('');">
<input id=btnStart type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' DISABLED 
 onmouseover='javascript:this.className="btnUP";' value="Start" onclick="javascript:doServiceCmd('run');">
<input id=btnStop type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' DISABLED 
 onmouseover='javascript:this.className="btnUP";' value="Stop" onclick="javascript:doServiceCmd('stop');">
<input id=btnForbid type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' DISABLED 
 onmouseover='javascript:this.className="btnUP";' value="Disable" onclick="javascript:doServiceCmd('forbid');">
<input id=btnManual type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' DISABLED 
 onmouseover='javascript:this.className="btnUP";' value="Manual" onclick="javascript:doServiceCmd('manual');">
<input id=btnAuto type="button" class="btnOff" onmouseout='javascript:this.className="btnOff";' DISABLED 
 onmouseover='javascript:this.className="btnUP";' value="Auto" onclick="javascript:doServiceCmd('auto');">
&nbsp;&nbsp;<span id="lblService" name="lblService"></span>
</td>
</tr>

<tr>
<td valign=top >
 <div style="height:100%;width:100%;overflow:auto;" >
 <table id=tblService name=tblService width=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
 <THEAD>
 <tr height=18px bgColor="Silver">
 <th width=20px > &nbsp; </th>
 <th width=60px style="cursor:pointer" onclick="sortSlist('status');"> <u>Status</u> </th>
 <th width=60px style="cursor:pointer" onclick="sortSlist('rtype');"> <u>Start Type</u> </th>
 <th width=120px> Service Type </th>
 <th style="cursor:pointer" onclick="sortSlist('sname');"> <u>Service Name</u> </th>
 <th> Display Name </th>
 <th> Description </th>
 <th> Module Path </th>
 </tr></THEAD>
 <TBODY id="slistTbody"></TBODY>
 </table>
 </div>
</td>
</tr>

</table>

</BODY>
</HTML>
