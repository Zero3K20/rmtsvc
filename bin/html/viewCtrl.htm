<HTML style="height:100%;">
<HEAD>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE=javascript src="viewCtrl.js"></SCRIPT>
</HEAD>
<body onload="window_onload()" style="overflow:hidden;height:100%;margin:0;padding:0;user-select:none;-webkit-user-select:none;-ms-user-select:none;" onselectstart="return false;">
<table WIDTH=100%  height=100% BORDER=0 CELLSPACING=0 CELLPADDING=0 style="height:100%;">
<tr><td valign=top style="height:100%;">
<div id=divScreen style="height:100%;width:100%;overflow:hidden;position:relative;">
   <canvas id=screenimage style="max-width:100%;max-height:100%;display:block;" draggable="false"></canvas>
   <button id="btnInstall" onclick="installAsApp()" title="Install as App"
    style="position:absolute;top:4px;right:4px;z-index:100;opacity:0.45;font-size:14px;cursor:pointer;background:#222;color:#fff;border:1px solid #666;padding:2px 6px;line-height:1.2;display:none;"
    onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.45'">&#x2B07; Install</button>
</div>
<input type=text style="position:absolute;height:0px;width:0px;border:0;outline:0;padding:0;margin:0;overflow:hidden;" value="" id=txtHide name=txtHide>
</td></tr>

</table>
<SCRIPT LANGUAGE="javascript">
document.oncontextmenu = new Function("return false;");
var _img = document.getElementById("screenimage");
var _txtHide = document.getElementById("txtHide");
_img.onmousemove = msmove;
_img.onclick = msclick;
_img.ondblclick = msdblclick;
_img.ondragstart = function(e){ e.preventDefault(); return false; };
_img.onmousedown = msdown;
_img.onmouseup = msup;
if(_img.addEventListener)
{
_img.addEventListener("wheel", mswheel, {passive:false});
}
else
{
_img.onmousewheel = mswheel;
}
document.addEventListener('keydown', keydown, true);
document.addEventListener('keyup', keyup, true);
</SCRIPT>
</BODY>
</HTML>
