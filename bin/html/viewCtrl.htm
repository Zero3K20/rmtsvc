<HTML style="height:100%;">
<HEAD>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=utf-8">
<LINK REL="stylesheet" TYPE="text/css" HREF="style.css">
<SCRIPT LANGUAGE=javascript src="common.js"></SCRIPT>
<SCRIPT LANGUAGE=javascript src="viewCtrl.js"></SCRIPT>
</HEAD>
<body onload="window_onload()" style="overflow:hidden;height:100%;margin:0;padding:0;">
<table WIDTH=100%  height=100% BORDER=0 CELLSPACING=0 CELLPADDING=0>
<tr><td valign=top style="height:100%;">
<div id=divScreen style="height:100%;width:100%;overflow:hidden;">
   <img name=screenimage id=screenimage style="max-width:100%;max-height:100%;display:block;" src="/capStream">
</div>
<input type=text style="height:0px;width:0px;" value="" id=txtHide name=txtHide>
</td></tr>

</table>
<SCRIPT LANGUAGE="javascript">
document.oncontextmenu = new Function("return false;");
var _img = document.getElementById("screenimage");
var _txtHide = document.getElementById("txtHide");
_img.onmousemove = msmove;
_img.onclick = msclick;
_img.ondblclick = msdblclick;
_img.ondragend = msdrop;
_img.onmousedown = msdown;
_img.onmouseup = msup;
if(_img.addEventListener)
{
_img.addEventListener("wheel", mswheel, {passive:false});
}
else
{
_img.onmousewheel = mswheel;
}
_txtHide.onkeyup = keyup;
</SCRIPT>
</BODY>
</HTML>
